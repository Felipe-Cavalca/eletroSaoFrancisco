<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eletrônica São Francisco</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --primary: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1e293b 0, #0b1224 35%, #0b1224 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid #1f2937;
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 {
      font-size: 1.8rem;
      letter-spacing: 0.5px;
      color: var(--primary);
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.75rem;
      margin-bottom: 16px;
    }
    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 0 0 rgba(56,189,248,0.7);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(56,189,248,0.7); }
      70% { box-shadow: 0 0 0 16px rgba(56,189,248,0); }
      100% { box-shadow: 0 0 0 0 rgba(56,189,248,0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge"><span class="pulse"></span>Em construção</div>
    <h1>Eletrônica São Francisco</h1>
    <p>Ambiente pronto! O devcontainer já inicia com Apache servindo este diretório. Edite este <code>index.html</code> para começar o site.</p>
  </main>
</body>
</html>
